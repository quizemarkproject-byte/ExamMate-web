<div class="min-h-screen flex flex-col">
  <div class="p-6 flex-1">
    <h1 class="text-2xl font-bold mb-6">Available Quizzes</h1>

    @if (loading) {
    <div class="text-gray-500">Loading quizzes...</div>
    } @else if (!loading && quizData.length === 0) {
    <div class="text-gray-500">No quizzes available.</div>
    } @else {
    <ul class="space-y-4">
      @for (quiz of quizData; track quiz.id ) {
      <li class="p-4 border rounded hover:shadow cursor-pointer">
        <a
          [routerLink]="['/quiz', quiz.id]"
          class="block text-lg font-semibold text-gray-800 hover:underline"
        >
          {{ quiz.name }}
        </a>
        <p class="text-sm text-gray-600">
          Time Limit: {{ quiz.timeLimit | duration }}
        </p>
      </li>
      }
    </ul>
    }
  </div>

  <app-footer />
</div>
