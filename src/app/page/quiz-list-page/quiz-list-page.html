<div class="p-6 max-w-3xl mx-auto">
  <h1 class="text-2xl font-bold mb-6">Available Quizzes</h1>

  @if (loading) {
    <div class="text-center text-gray-500">Loading quizzes...</div>
  } @else if (!loading && quizData?.length === 0) {
    <div class="text-center text-gray-500">No quizzes available.</div>
  } @else {
    <ul class="space-y-4">
      @for (quiz of quizData; track quiz.id ) {
        <li class="p-4 border rounded hover:shadow cursor-pointer">
          <a
            [routerLink]="['/quiz', quiz.id]"
            class="block text-lg font-semibold text-blue-600 hover:underline"
          >
            {{ quiz.title }}
          </a>
          <p class="text-sm text-gray-600">Time Limit: {{ quiz.timeLimit  | duration }}</p>
        </li>
      }
    </ul>
  }
</div>

<app-footer />
