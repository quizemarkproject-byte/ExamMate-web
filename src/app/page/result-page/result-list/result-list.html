<div class="flex flex-wrap gap-4 p-4 flex-1">
  @if (quizResults && quizResults.length > 0) {
    @for (result of quizResults; track $index) {
      <div
        class="flex flex-col gap-2 rounded-lg p-6 bg-mist 
               w-full sm:w-[48%] lg:w-[31%] 
               min-w-[9.875rem] flex-1"
      >
        <p class="text-charcoal text-base font-medium leading-normal text-nowrap">
          {{ result.quizTitle }}
        </p>

        <div class="flex justify-between flex-wrap gap-2">
          <div>
            <p class="text-charcoal text-sm font-normal leading-normal">
              Total Questions: <span>{{ result.totalQuestions }}</span>
            </p>
            <p class="text-charcoal text-sm font-normal leading-normal">
              Correct Answers: {{ result.correctAnswers }}
            </p>
          </div>
          <div>
            <h1 class="text-xl sm:text-2xl lg:text-3xl font-bold">
              {{ result.scorePercentage }}%
            </h1>
          </div>
        </div>

        <a
          [routerLink]="['/quiz/results', result.id]"
          class="mt-2 inline-flex items-center justify-center 
                 px-3 py-2 text-sm font-medium text-white 
                 bg-gray-800 rounded-md 
                 hover:bg-gray-900 active:bg-black 
                 transition-colors duration-200"
        >
          View Details
        </a>
      </div>
    }
  } @else {
    <p class="text-slate text-sm font-normal leading-normal px-4">
      No quiz results available.
    </p>
  }
</div>
