<div class="flex flex-wrap gap-4 p-4">
  @if (quizResults && quizResults.length > 0) { @for (result of quizResults;
  track $index) {
  <div
    class="flex min-w-[158px] flex-1 flex-col gap-2 rounded-lg p-6 bg-mist"
  >
    <p class="text-charcoal text-base font-medium leading-normal">
      {{ result.quizTitle }}
    </p>

    <div class="flex justify-between">
      <div>
        <p class="text-charcoal text-sm font-normal leading-normal">
          Total Questoins: <span> {{ result.totalQuestions }} </span>
        </p>
        <p class="text-charcoal text-sm font-normal leading-normal">
          Correct Answers: {{ result.correctAnswers }}
        </p>
      </div>
      <div>
        <h1 class="text-3xl">{{ result.scorePercentage }}%</h1>
      </div>
    </div>

    <a
      [routerLink]="['/quiz/results', result.id]"
      class="mt-2 inline-flex items-center justify-center px-4 py-2 text-sm font-medium text-white bg-gray-800 rounded-md hover:bg-gray-900 active:bg-black transition-colors duration-200"
    >
      View Details
    </a>
  </div>
  } } @else {
  <p class="text-slate text-sm font-normal leading-normal px-4">
    No quiz results available.
  </p>
  }
</div>
