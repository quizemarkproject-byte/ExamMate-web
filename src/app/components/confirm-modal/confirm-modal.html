@if(state.open){
<div class="fixed inset-0 z-50 flex items-center justify-center p-4">
  <div class="absolute inset-0 bg-black/50"></div>
  <div class="relative bg-white rounded-2xl shadow-lg border border-gray-200 w-full max-w-md">
    <div class="p-6 border-b border-gray-200">
      <h3 class="text-lg font-semibold text-gray-900">{{ state.title }}</h3>
    </div>
    <div class="p-6 text-gray-700">
      {{ state.message }}
    </div>
    <div class="p-6 border-t border-gray-200 flex gap-3 justify-end">
      <button (click)="onCancel()" class="px-4 py-2 rounded-lg border border-gray-300 text-gray-700 hover:bg-gray-50">
        {{ state.cancelText }}
      </button>
      <button (click)="onConfirm()" class="px-4 py-2 rounded-lg bg-blue-600 text-white hover:bg-blue-700">
        {{ state.confirmText }}
      </button>
    </div>
  </div>
</div>
}
