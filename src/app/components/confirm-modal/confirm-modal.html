@if ((state$ | async)?.open) {
  <div class="fixed inset-0 z-50 flex items-center justify-center bg-black/40">
    <div class="bg-white rounded-lg shadow-xl max-w-lg w-full mx-4">
      <div class="p-4 border-b">
        <h3 class="text-lg font-medium text-gray-900">{{ (state$ | async)?.title }}</h3>
      </div>
      <div class="p-4">
        <p class="text-sm text-gray-700">{{ (state$ | async)?.message }}</p>
      </div>
      <div class="p-4 flex justify-end gap-3 border-t">
        <button
          type="button"
          class="px-3 py-2 rounded bg-gray-100 text-sm text-gray-700 hover:bg-gray-200"
          (click)="cancelAction()"
        >
          {{ (state$ | async)?.cancelText }}
        </button>
        <button
          type="button"
          class="px-3 py-2 rounded bg-red-600 text-sm text-white hover:bg-red-700"
          (click)="confirmAction()"
        >
          {{ (state$ | async)?.confirmText }}
        </button>
      </div>
    </div>
  </div>
}
