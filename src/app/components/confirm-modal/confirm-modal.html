@if ((state$ | async)?.open) {
  <div class="fixed inset-0 z-50 flex items-center justify-center bg-black/40 dark:bg-black/70 transition-colors duration-300">
    <div class="bg-white dark:bg-slate-800 rounded-lg shadow-xl max-w-lg w-full mx-4 transition-colors duration-300">
      <div class="p-4 border-b border-gray-200 dark:border-slate-700 transition-colors duration-300">
        <h3 class="text-lg font-medium text-gray-900 dark:text-white transition-colors duration-300">{{ (state$ | async)?.title }}</h3>
      </div>
      <div class="p-4">
        <p class="text-sm text-gray-700 dark:text-gray-300 transition-colors duration-300">{{ (state$ | async)?.message }}</p>
      </div>
      <div class="p-4 flex justify-end gap-3 border-t border-gray-200 dark:border-slate-700 transition-colors duration-300">
        <button
          type="button"
          class="px-3 py-2 rounded bg-gray-100 dark:bg-slate-700 text-sm text-gray-700 dark:text-gray-300 hover:bg-gray-200 dark:hover:bg-slate-600 transition-colors duration-300"
          (click)="cancelAction()"
        >
          {{ (state$ | async)?.cancelText }}
        </button>
        <button
          type="button"
          class="px-3 py-2 rounded bg-red-600 dark:bg-red-700 text-sm text-white hover:bg-red-700 dark:hover:bg-red-800 transition-colors duration-300"
          (click)="confirmAction()"
        >
          {{ (state$ | async)?.confirmText }}
        </button>
      </div>
    </div>
  </div>
}
