@if (working) {
  <div class="fixed inset-0 z-50 flex items-center justify-center bg-black/40 p-4">
    <div class="bg-white rounded-lg shadow-xl max-w-2xl w-full">
      <div class="p-4 border-b">
        <h3 class="text-lg font-medium text-gray-900">Edit Question</h3>
      </div>
      <div class="p-4 space-y-4">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Question text</label>
          <input [(ngModel)]="working.text" class="w-full px-3 py-2 border rounded" maxlength="255" />
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-2">Options</label>
          <div class="space-y-2">
            @for (opt of working.options; track $index; let oi = $index) {
            <div class="flex items-center gap-2">
              <label class="flex items-center gap-2 flex-1">
                <input type="radio" name="correctAnswer" [value]="opt" [(ngModel)]="working.correctAnswer" class="form-radio" />
                <input [(ngModel)]="working.options[oi]" class="flex-1 px-3 py-2 border rounded" maxlength="255" />
              </label>
              <button (click)="removeOption(oi)" class="text-red-500" type="button" [disabled]="!working || working.options.length <= 2">Remove</button>
            </div>
            }
          </div>
          <div class="mt-2">
            <button (click)="addOption()" type="button" class="text-sm text-purple-600">+ Add option</button>
          </div>
        </div>
      </div>
      <div class="p-4 border-t flex justify-end gap-3">
        <button (click)="cancel()" class="px-3 py-2 rounded bg-gray-100">Cancel</button>
        <button (click)="confirm()" class="px-3 py-2 rounded bg-blue-600 text-white">Save</button>
      </div>
    </div>
  </div>
}
