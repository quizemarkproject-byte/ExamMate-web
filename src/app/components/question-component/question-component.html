<h2
  class="text-[#111418] tracking-light text-[28px] font-bold leading-tight px-4 text-left pb-3 pt-5"
>
  Question {{ questionNumber }} of {{ totalQuestions }}
</h2>
<p class="text-[#111418] text-base font-normal leading-normal pb-3 pt-1 px-4">
  {{ question.text }}
</p>

<div class="flex flex-col gap-3 p-4">
  @for (option of question.options; track $index) {
  <label
    class="flex items-center gap-4 rounded-lg border border-solid border-[#dbe0e6] p-[15px]"
    [attr.for]="option"
  >
    <input
      type="radio"
      class="h-5 w-5 border-2 border-[#dbe0e6] bg-transparent text-transparent checked:border-[#111418] checked:bg-[image:--radio-dot-svg] focus:outline-none focus:ring-0 focus:ring-offset-0 checked:focus:border-[#111418]"
      name="answer"
      [id]="option"
      [value]="option"
      [checked]="option === selectedAnswer"
      (click)="selectAnswer(option)"
    />
    <div class="flex grow flex-col">
      <p class="text-[#111418] text-sm font-medium leading-normal">
        {{ option }}
      </p>
    </div>
  </label>
  }
</div>
