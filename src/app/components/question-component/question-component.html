<div class="flex flex-col gap-4">
  @for (option of question.options; track $index) {
  <label
    class="flex items-center gap-4 rounded-xl border-2 p-4 cursor-pointer transition-all duration-200"
    [ngClass]="option === selectedAnswer ? 'border-blue-600 bg-blue-600' : 'border-gray-200 bg-white hover:border-blue-400 hover:bg-blue-50'"
    (click)="selectAnswer(option)"
    [attr.for]="'option-' + $index"
  >
    <!-- Removed radio button -->
    <div class="flex items-center gap-3 flex-1">
      <div
        class="w-8 h-8 rounded-full flex items-center justify-center font-semibold text-sm flex-shrink-0"
        [ngClass]="option === selectedAnswer ? 'bg-white text-blue-600' : 'bg-gray-200 text-gray-800'"
      >
        {{ getOptionLetter($index) }}
      </div>
      <p
        class="text-base font-medium leading-relaxed"
        [ngClass]="option === selectedAnswer ? 'text-white' : 'text-gray-800'"
      >
        {{ option }}
      </p>
    </div>
  </label>
  }
</div>
