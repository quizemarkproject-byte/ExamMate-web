<h2
  class="text-charcoal tracking-light text-2xl font-bold leading-tight px-4 text-left pb-3 pt-5"
>
  Question {{ questionNumber }} of {{ totalQuestions }}
</h2>
<p class="text-charcoal text-base font-normal leading-normal pb-3 pt-1 px-4">
  {{ question.text }}
</p>

<div class="flex flex-col gap-3 p-4">
  @for (option of question.options; track $index) {
  <label
    class="flex items-center gap-4 rounded-lg border border-solid border-cloud p-4"
    [attr.for]="option"
  >
    <input
      type="radio"
      class="h-5 w-5 border-2 border-cloud bg-transparent text-transparent checked:border-charcoal checked:bg-[image:--radio-dot-svg] focus:outline-none focus:ring-0 focus:ring-offset-0 checked:focus:border-charcoal"
      name="answer"
      [id]="option"
      [value]="option"
      [checked]="option === selectedAnswer"
      (click)="selectAnswer(option)"
    />
    <div class="flex grow flex-col">
      <p class="text-charcoal text-sm font-medium leading-normal cursor-pointer">
        {{ option }}
      </p>
    </div>
  </label>
  }
</div>
