<div class="w-full">
  <div class="relative w-full h-10 rounded-xl overflow-hidden bg-gradient-to-r from-gray-100 to-gray-200 shadow-soft border border-gray-200">
    <!-- Progress bar (shrinking) -->
    <div class="absolute top-0 left-0 h-full bg-gradient-to-r from-primary-500 to-primary-600 transition-[width] duration-1000 ease-linear shadow-glow"
         [style.width.%]="progressPercent"></div>
    <!-- Overlay content -->
    <div class="relative z-10 flex items-center justify-between h-full px-4 text-sm font-bold tracking-wide">
      <div class="flex items-center gap-2 text-white">
        <i class="fas fa-clock"></i>
        @if (hours > 0) {
          <span>{{ hours | number:'2.0' }}:</span>
        }
        <span>{{ minutes | number:'2.0' }}:{{ seconds | number:'2.0' }}</span>
      </div>
      @if (totalSeconds) {
        <span class="hidden sm:inline text-gray-700 font-semibold">{{ progressPercent | number:'1.0-0' }}%</span>
      }
    </div>
  </div>
  <span class="sr-only" aria-live="polite">Time remaining {{ hours }} hours {{ minutes }} minutes {{ seconds }} seconds</span>
</div>
