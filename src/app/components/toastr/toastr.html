@if (visible) {
  <div class="fixed top-4 right-4 z-[10000] w-[92vw] max-w-sm pointer-events-auto">
    <div class="relative overflow-hidden rounded-2xl shadow-2xl text-gray-900"
      role="status" aria-live="polite"
      style="animation: toastFadeIn 240ms ease-out; background: rgba(255,255,255,0.04); -webkit-backdrop-filter: blur(10px); backdrop-filter: blur(10px);">

      <div class="flex items-start gap-3 p-4">
  <!-- Icon (circle + glyph) -->
  <div class="flex-shrink-0 flex items-center justify-center h-10 w-10 rounded-full text-xl text-gray-800" style="backdrop-filter: blur(4px);">{{ icon }}</div>

        <!-- Content -->
        <div class="flex-1 min-w-0">
          <p class="text-sm font-semibold leading-5 truncate">{{ type | titlecase }}</p>
          <p class="mt-1 text-sm leading-5 break-words text-gray-700">{{ message }}</p>
        </div>

  <!-- Close Button -->
  <button type="button" (click)="closeToast()" class="ml-3 inline-flex items-center justify-center h-9 w-9 rounded-full text-gray-700 hover:text-gray-900 focus:outline-none focus:ring-2 focus:ring-gray-300" aria-label="Close">
          <span class="sr-only">Close</span>
          <svg class="h-4 w-4" viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <path d="M6 6L18 18M6 18L18 6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
      </div>

    </div>

    <style>
      /* progress bar removed */
      @keyframes toastFadeIn {
        from { opacity: 0; transform: translateY(-6px) scale(0.995); }
        to { opacity: 1; transform: translateY(0) scale(1); }
      }
      /* Respect reduced motion */
      @media (prefers-reduced-motion: reduce) {
        .toast-enter { animation: none !important; }
      }
    </style>
  </div>
}
