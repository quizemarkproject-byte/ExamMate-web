@if (visible) {
  <div class="fixed top-4 right-4 z-[10000] w-[92vw] max-w-sm pointer-events-auto">
    <div class="relative overflow-hidden rounded-xl shadow-2xl ring-1 ring-black/10 text-white" [ngClass]="bgClass" role="status" aria-live="polite">
      <div class="flex items-start gap-3 p-4">
        <!-- Icon -->
        <span class="text-2xl leading-none mt-0.5">{{ icon }}</span>

        <!-- Content -->
        <div class="flex-1 min-w-0">
          <p class="text-sm font-semibold leading-5 truncate">
            {{ type | titlecase }}
          </p>
          <p class="mt-0.5 text-sm/5 break-words opacity-95">
            {{ message }}
          </p>
        </div>

        <!-- Close Button -->
        <button type="button" (click)="closeToast()" class="text-white/90 hover:text-white text-xl leading-none" aria-label="Close">×</button>
      </div>

      <!-- Progress bar -->
      <div class="absolute bottom-0 left-0 h-1 w-full bg-white/20">
        <div class="h-full bg-white/80" [style.animation]="toastDuration + 'ms linear 0ms 1 forwards shrink'" [style.width]="'100%'"></div>
      </div>
    </div>
    <style>
      @keyframes shrink { from { width: 100%; } to { width: 0%; } }
    </style>
  </div>
}
