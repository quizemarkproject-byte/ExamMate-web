<header
  class="w-full bg-white border-b border-gray-200 px-4 md:px-8 py-4 flex justify-between items-center shadow-sm"
>
  <div class="flex items-center gap-4">
    <button
      class="md:hidden p-2 text-gray-600 hover:bg-gray-100 rounded-lg transition-colors duration-300"
      (click)="toggleSidebar.emit()"
    >
      <i class="fas fa-bars text-xl"></i>
    </button>
    <div>
      <a href="/home" class="flex items-center gap-2 text-gray-900">
        <i class="fas fa-brain text-2xl md:text-3xl text-amber-400"></i>
        <span class="text-xl md:text-2xl font-bold">ExamMate</span>
      </a>
    </div>
  </div>
  <div class="flex items-center">
    @if (!isLoggedIn) {
      <button
        class="hidden md:flex items-center gap-2 bg-white/10 text-gray-700 border-2 border-gray-300 px-4 md:px-6 py-2 rounded-lg font-semibold hover:bg-gray-100 hover:border-gray-400 transition-all duration-300"
        (click)="login()"
      >
        <span class="hidden md:inline">Login/Signup</span>
      </button>
    } @else {
      <button
        class="hidden md:flex items-center gap-2 bg-gradient-to-r from-amber-400 to-amber-500 text-white px-4 md:px-6 py-2 rounded-lg font-semibold hover:shadow-lg hover:-translate-y-0.5 transition-all duration-300"
        (click)="logout()"
      >
        <span class="hidden md:inline">Logout</span>
      </button>
    }
    <app-auth-modal [open]="showAuth" (closed)="handleAuthClosed()" (authenticated)="handleAuthenticated($event)"></app-auth-modal>
  </div>
</header>
