<div class="flex">
  <!-- Sidebar -->
  <div
    [class.w-0]="!isSidebarOpen"
    [class.w-80]="isSidebarOpen"
    class="relative transition-all duration-300 overflow-hidden flex flex-col bg-dark_gray_blue min-h-[700px]"
  >
    <!-- Close Button (absolute) -->
     @if(isSidebarOpen){
    <button
      class="absolute top-2 right-2 text-white z-10"
      (click)="toggleSidebar()"
    >
      ✕
    </button>
  }

    <div class="flex flex-col justify-between h-full p-4 mt-8">
      <!-- Navigation Links -->
      <div class="flex flex-col gap-4">
        <div class="flex flex-col gap-2">
          @for (link of navLinks; track link.url) {
          <div
            class="flex items-center gap-3 px-3 py-2 rounded-lg bg-blue_black hover:bg-blue_black_hover cursor-pointer"
            [routerLink]="link.url"
            routerLinkActive="bg-blue_black"
          >
            <img [src]="link.icon" alt="ExamMate Logo" class="filter invert" />
            <p class="text-white text-sm font-medium leading-normal">
              {{ link.label }}
            </p>
          </div>
          }
        </div>
      </div>

      <!-- Logout Button at Bottom -->
      @if (isLoggedIn){
      <div class="mt-auto">
        <button
          class="flex items-center gap-3 px-3 py-2 rounded-lg"
          (click)="logout()"
        >
          <img src="assets/svg/logout.svg" alt="Logout Icon" class="h-6 w-6" />
          <span class="text-white text-sm font-medium">Logout</span>
        </button>
      </div>
      }
    </div>
  </div>

  <!-- Main Content -->
  <div class="flex-1">
    <!-- Open Sidebar Button -->
     @if(!isSidebarOpen){
    <button
      class="m-3 px-1 text-white rounded-lg text-3xl"
      (click)="toggleSidebar()"
    >
      ☰
    </button>
  }
    <ng-content></ng-content>
  </div>
</div>
