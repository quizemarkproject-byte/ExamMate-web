<aside
  [class.-translate-x-full]="!open"
  class="bg-white border-r border-gray-200 flex flex-col transition-transform duration-300 md:translate-x-0 md:w-[280px] w-full absolute md:relative top-0 left-0 md:top-auto md:left-auto h-full md:h-full z-40"
  id="sidebar"
>
  <div class="p-6 border-b border-gray-200 flex justify-between items-center">
    <h3 class="text-lg font-semibold text-gray-700">Quiz Navigation</h3>
    <button
      class="md:hidden p-1 text-gray-600 hover:bg-gray-100 rounded transition-colors duration-300"
      (click)="onClose()"
    >
      <i class="fas fa-times text-xl"></i>
    </button>
  </div>
  <nav class="flex-1 py-4 flex flex-col">
    @for (link of navLinks; track link.url) {
    <a
      [routerLink]="link.url"
      routerLinkActive="!text-blue-600 !border-blue-600 bg-gray-50"
      class="group flex items-center gap-3 px-6 py-3 text-gray-600 hover:bg-gray-50 hover:text-gray-900 transition-all duration-300 border-l-4 border-transparent hover:border-blue-600"
    >
      <i [class]="link.icon + ' group-[.router-link-active]:text-blue-600'"></i>
      <span>{{ link.label }}</span>
    </a>

    }
  </nav>
  <!-- Footer: stick to bottom when sidebar is tall -->
  <div class="mt-auto p-6 border-t border-gray-200">
    <div class="flex justify-between items-center">
        <span class="text-sm text-gray-600">Quizzes Completed</span>
        <span class="font-semibold text-gray-900">{{ count }}</span>
      </div>
  </div>
</aside>
