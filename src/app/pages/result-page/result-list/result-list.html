<div class="flex flex-wrap justify-between gap-3 p-4">
  <p
    class="text-white tracking-light text-[32px] font-bold leading-tight min-w-72"
  >
    Quiz Results
  </p>
</div>

@if (quizResults.length === 0) {
<p class="text-white p-4">No quizzes taken.</p>
} @else {
<div class="grid grid-cols-3 gap-3 p-4">
  @for (result of quizResults; track result.id) {
  <div
    [routerLink]="['/result', result.id]"
    class="flex justify-between rounded-lg border border-[#343465] bg-[#1a1a32] hover:bg-blue_black_hover p-4 items-center cursor-pointer"
  >
    <div class="flex flex-col gap-1">
      <h2 class="text-white text-base font-bold leading-tight">
        {{ result.quizTitle }}
      </h2>
      <p class="text-white">{{ result.completedAt | date : "medium" }}</p>
    </div>
    <h2 class="text-white text-base font-bold leading-tight">
      {{ (result.score / result.totalQuestions) * 100 | number : "1.0-2" }}%
    </h2>
  </div>
  }
</div>
}
