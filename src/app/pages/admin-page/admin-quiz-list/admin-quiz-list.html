<div>
  <div class="flex items-center justify-between mb-3">
    <h2 class="text-sm font-medium text-gray-700">Quizzes</h2>
    <button
      (click)="createQuiz.emit()"
      class="bg-purple-600 text-white px-3 py-1.5 rounded-lg hover:bg-purple-700 text-sm"
    >
      + Create Quiz
    </button>
  </div>

  <div class="space-y-3">
    @if (!quizzes || quizzes.length === 0) {
    <div class="text-sm text-gray-500">
      No quizzes yet. Create one to get started.
    </div>
    } @else { @for (q of quizzes; track q.id || $index; let i = $index) {
    <div
      class="flex items-center justify-between gap-3 p-2 rounded-lg hover:bg-gray-50"
    >
      <button (click)="selectQuiz.emit(i)" class="text-left flex-1">
        <div class="font-medium text-gray-800">{{ q.name }}</div>
        <div class="text-xs text-gray-400 mt-1">
          Time: {{ q.timeLimit | duration }} · Limit: {{ q.questionLimit }}
        </div>
      </button>
      <div class="flex items-center gap-2">
        <button
          (click)="editQuiz.emit(i)"
          title="Edit quiz"
          class="text-blue-600 hover:text-blue-800"
        >
          <i class="fas fa-edit"></i>
        </button>
        <button
          (click)="onDelete(i)"
          title="Delete quiz"
          class="text-red-500 hover:text-red-700"
        >
          <i class="fas fa-trash"></i>
        </button>
      </div>
    </div>
    } }
  </div>
</div>
