<div class="max-w-7xl mx-auto px-3 sm:px-4 md:px-6 py-4 md:py-8 h-screen">
  <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-3 sm:gap-0 mb-6">
    <h1 class="text-3xl font-bold text-gray-900 dark:text-white flex items-center gap-2 transition-colors duration-300">
      <i class="fas fa-tools text-primary-500"></i>
      Admin — Quiz Builder
    </h1>
    <div class="flex items-center gap-2 sm:gap-3">
      <!-- Dark Mode Toggle -->
      <button
        (click)="themeService.toggleTheme()"
        class="p-2.5 text-gray-600 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-slate-700 rounded-xl transition-all duration-300 hover:shadow-soft"
        [attr.aria-label]="themeService.isDarkMode() ? 'Switch to light mode' : 'Switch to dark mode'"
        title="Toggle dark mode"
      >
        @if (themeService.isDarkMode()) {
          <i class="fas fa-sun text-xl text-amber-400"></i>
        } @else {
          <i class="fas fa-moon text-xl text-primary-600"></i>
        }
      </button>
      <a 
        routerLink="/home" 
        class="px-3 sm:px-4 py-2 text-sm sm:text-base bg-white dark:bg-slate-800 text-gray-700 dark:text-gray-300 border-2 border-gray-300 dark:border-slate-600 rounded-xl hover:bg-gray-50 dark:hover:bg-slate-700 hover:border-gray-400 dark:hover:border-slate-500 hover:shadow-soft transition-all duration-300 font-semibold"
        title="Go to Home Page"
      >
        <i class="fas fa-home mr-1"></i><span class="hidden xs:inline">Home</span>
      </a>
      <a 
        routerLink="/quiz" 
        class="px-3 sm:px-4 py-2 text-sm sm:text-base bg-gradient-to-r from-primary-500 to-primary-600 text-white rounded-xl hover:shadow-glow hover:-translate-y-0.5 transition-all duration-300 font-semibold"
        title="View All Quizzes"
      >
        <i class="fas fa-book mr-1"></i><span class="hidden xs:inline">Quizzes</span>
      </a>
      <a 
        routerLink="/admin/analytics" 
        class="px-3 sm:px-4 py-2 text-sm sm:text-base bg-gradient-to-r from-accent-500 to-accent-600 text-white rounded-xl hover:shadow-glow-accent hover:-translate-y-0.5 transition-all duration-300 font-semibold"
        title="View Admin Analytics Dashboard"
      >
        <i class="fas fa-chart-pie mr-1"></i><span class="hidden xs:inline">Analytics</span>
      </a>
    </div>
  </div>

  <div class="flex flex-col lg:grid lg:grid-cols-3 gap-4 md:gap-6 lg:h-full min-h-0 min-w-0">
    <!-- Left: Quiz list / create and question bank -->
    <!-- Mobile: Collapsible sections, Desktop: Sidebar -->
    <aside class="lg:col-span-1 space-y-3 lg:space-y-0 lg:bg-white lg:dark:bg-slate-800 lg:rounded-3xl lg:border lg:border-gray-100 lg:dark:border-slate-700 lg:shadow-soft lg:p-4 lg:h-full lg:min-h-0 lg:overflow-auto transition-colors duration-300">
      <!-- Quiz List Section -->
      <div class="bg-white dark:bg-slate-800 rounded-2xl border border-gray-100 dark:border-slate-700 shadow-soft lg:border-0 lg:rounded-none lg:shadow-none transition-colors duration-300">
        <button 
          (click)="toggleQuizList()" 
          class="lg:hidden w-full flex items-center justify-between p-3 text-left font-bold text-gray-900 dark:text-white hover:bg-gray-50 dark:hover:bg-slate-700 rounded-t-2xl transition-colors duration-300">
          <span class="flex items-center gap-2">
            <i class="fas fa-list text-primary-500"></i>
            <span>Quizzes</span>
            <span class="text-xs font-normal text-gray-600 dark:text-gray-400">({{ quizzes.length }})</span>
            @if (selectedQuiz) {
              <span class="text-xs font-normal text-gray-600 dark:text-gray-400">- {{ selectedQuiz.name }}</span>
            }
          </span>
          <i class="fas" [class.fa-chevron-down]="!showQuizList" [class.fa-chevron-up]="showQuizList"></i>
        </button>
        <div [class.hidden]="!showQuizList" [class.lg:block]="true" class="p-3 lg:p-0">
          <admin-quiz-list
            [quizzes]="quizzes"
            [selectedIndex]="selectedQuizIndex"
            (createQuiz)="createQuiz()"
            (selectQuiz)="selectQuiz($event)"
            (deleteQuiz)="deleteQuiz($event)"
            (editQuiz)="editQuiz($event)">
          </admin-quiz-list>
        </div>
      </div>

      <!-- Question Bank Section -->
      <div class="bg-white dark:bg-slate-800 rounded-2xl border border-gray-100 dark:border-slate-700 shadow-soft lg:border-0 lg:rounded-none lg:border-t lg:dark:border-t-slate-700 lg:pt-4 lg:mt-6 lg:shadow-none transition-colors duration-300">
        <button 
          (click)="toggleQuestionBank()" 
          class="lg:hidden w-full flex items-center justify-between p-3 text-left font-bold text-gray-900 dark:text-white hover:bg-gray-50 dark:hover:bg-slate-700 rounded-t-2xl transition-colors duration-300">
          <span class="flex items-center gap-2">
            <i class="fas fa-database text-accent-500"></i>
            <span>Question Bank</span>
            <span class="text-xs font-normal text-gray-600 dark:text-gray-400">({{ questionBank.length }})</span>
          </span>
          <i class="fas" [class.fa-chevron-down]="!showQuestionBank" [class.fa-chevron-up]="showQuestionBank"></i>
        </button>
        <div [class.hidden]="!showQuestionBank" [class.lg:block]="true" class="p-3 lg:p-0">
          <admin-question-bank
            [questionBank]="questionBank"
            [selectedQuizIndex]="selectedQuizIndex"
            (attachQuestion)="attachQuestionFromBank($event)"
            (createBankQuestion)="createQuestion()"
            (deleteQuestion)="deleteQuestion($event)"
            (editQuestion)="onQuestionEdited($event)">
          </admin-question-bank>
          <!-- Create/Edit question modal (scoped to admin page) -->
          <app-question-modal></app-question-modal>
        </div>
      </div>
    </aside>

    <!-- Right: Editor (delegated to child component) -->
    <section class="lg:col-span-2 bg-white dark:bg-slate-800 rounded-2xl sm:rounded-3xl border border-gray-100 dark:border-slate-700 shadow-soft p-3 sm:p-4 md:p-6 h-full min-h-0 overflow-auto min-w-0 transition-colors duration-300">
      @if (selectedQuizIndex === null) {
      <div class="flex items-center justify-center h-full">
        <div class="text-center">
          <i class="fas fa-clipboard-question text-6xl text-gray-300 mb-4"></i>
          <p class="text-lg font-semibold text-gray-900 dark:text-white mb-2">No Quiz Selected</p>
          <p class="text-sm text-gray-600 dark:text-gray-400">Select a quiz or create a new one to begin building questions.</p>
        </div>
      </div>
      } @else {
      <div class="min-h-[3rem] mb-3">
        @if (selectedQuizErrors.length > 0) {
        <div class="bg-red-50 border-2 border-red-200 rounded-xl p-4">
          <div class="flex items-start gap-2">
            <i class="fas fa-exclamation-circle text-red-500 mt-0.5"></i>
            <div class="text-sm text-red-700">
              @for (err of selectedQuizErrors; track $index) {<div>{{ err }}</div>}
            </div>
          </div>
        </div>
        }
      </div>

      <admin-question-editor
        [quiz]="quizzes[selectedQuizIndex]"
        [saving]="saving"
        (saveQuiz)="persistQuiz($event)"
        (validationErrors)="onValidationChange($event)">
      </admin-question-editor>
      }
    </section>
  </div>

  <!-- Create/Edit quiz modal -->
  <app-quiz-modal></app-quiz-modal>
</div>
