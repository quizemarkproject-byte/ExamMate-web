<div class="max-w-7xl mx-auto px-6 py-8 h-screen">
  <div class="flex items-center justify-between mb-6">
    <h1 class="text-2xl font-semibold text-gray-800">Admin — Quiz Builder</h1>
    <div class="flex items-center gap-3">
      <!-- Save All moved to the question editor (per-quiz save/validation) -->
    </div>
  </div>

  <div class="grid md:grid-cols-3 gap-6 h-full min-h-0 min-w-0">
    <!-- Left: Quiz list / create and question bank -->
    <aside class="col-span-1 bg-white rounded-2xl border border-gray-200 p-4 h-full min-h-0 overflow-auto">
      <admin-quiz-list
        [quizzes]="quizzes"
        [selectedIndex]="selectedQuizIndex"
        (createQuiz)="createQuiz()"
        (selectQuiz)="selectQuiz($event)"
        (deleteQuiz)="deleteQuiz($event)"
        (editQuiz)="editQuiz($event)">
      </admin-quiz-list>

      <div class="mt-6 border-t pt-4">
        <admin-question-bank
          [questionBank]="questionBank"
          [selectedQuizIndex]="selectedQuizIndex"
          (attachQuestion)="attachQuestionFromBank($event)"
          (createBankQuestion)="createQuestion()"
          (deleteQuestion)="deleteQuestion($event)"
          (editQuestion)="onQuestionEdited($event)">
        </admin-question-bank>
        <!-- Create/Edit question modal (scoped to admin page) -->
        <app-question-modal></app-question-modal>
      </div>
    </aside>

    <!-- Right: Editor (delegated to child component) -->
    <section class="col-span-2 bg-white rounded-2xl border border-gray-200 p-6 h-full min-h-0 overflow-auto min-w-0">
      <!-- show quiz-level validation in parent to keep single source of truth -->
      @if (selectedQuizIndex === null) {
      <div class="text-gray-500">Select a quiz on the left or create a new one to begin building questions.</div>
      } @else {
      <div class="mb-3">
        <div class="min-h-[3rem] mb-3">
            @if (selectedQuizErrors.length > 0) {
            <div class="text-sm text-red-500">
              @for (err of selectedQuizErrors; track $index) {<div>{{ err }}</div>}
            </div>
            }
        </div>

          <admin-question-editor
          [quiz]="selectedQuizIndex === null ? null : quizzes[selectedQuizIndex]"
          [saving]="saving"
          (saveQuiz)="persistQuiz($event)"
          (validationErrors)="onValidationChange($event)">
        </admin-question-editor>
      </div>
      }
    </section>
  </div>

  <!-- Create/Edit quiz modal -->
  <app-quiz-modal></app-quiz-modal>
</div>
