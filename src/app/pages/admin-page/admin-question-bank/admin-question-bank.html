<div>
  <div class="flex items-center justify-between mb-2">
    <h3 class="text-xs sm:text-sm font-medium text-gray-700 dark:text-gray-300 transition-colors duration-300">Question Bank</h3>
    <button
      (click)="createBankQuestion.emit()"
      class="bg-amber-400 text-white px-2 sm:px-3 py-1.5 rounded-lg hover:bg-amber-500 text-xs sm:text-sm"
      title="Create a New Question for Bank"
    >
      <i class="fas fa-plus"></i><span class="hidden xs:inline ml-1">Create</span>
    </button>
  </div>
  <div class="space-y-2">
    @if (!questionBank || questionBank.length === 0) {
    <div class="text-xs sm:text-sm text-gray-500 dark:text-gray-400 transition-colors duration-300">
      No questions in the bank yet. Create one to begin reusing questions
      across quizzes.
    </div>
    } @else { @for (bq of questionBank; track bq.id || $index; let bi = $index)
    {
    <div
      class="flex items-center justify-between gap-2 p-2 rounded hover:bg-gray-50 dark:hover:bg-slate-700 transition-colors duration-300"
    >
      <div class="flex-1 text-xs sm:text-sm text-gray-700 dark:text-gray-300 truncate transition-colors duration-300">
        {{ bq.text || "Untitled question" }}
      </div>
      <div class="flex items-center gap-1 sm:gap-2 flex-shrink-0">
        <button
          (click)="attachQuestion.emit(bi)"
          [disabled]="selectedQuizIndex === null"
          class="text-xs sm:text-sm text-purple-600 disabled:opacity-50 p-1"
          title="Attach Question to Selected Quiz"
        >
          <i class="fas fa-plus"></i><span class="hidden xs:inline ml-1">Attach</span>
        </button>
        <button
          (click)="onEdit(bi)"
          title="Edit question"
          class="text-xs sm:text-sm text-blue-600 hover:text-blue-800 p-1"
        >
          <i class="fas fa-edit"></i>
        </button>
        <button
          (click)="onDelete(bi)"
          title="Delete question"
          class="text-xs sm:text-sm text-red-500 hover:text-red-700 p-1"
        >
          <i class="fas fa-trash"></i>
        </button>
      </div>
    </div>
    } }
  </div>
</div>
