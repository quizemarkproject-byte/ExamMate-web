<div>
  <h3 class="text-sm font-medium text-gray-700 mb-2">Question Bank</h3>
  <div class="space-y-2">
    @if (!questionBank || questionBank.length === 0) {
    <div class="text-sm text-gray-500">
      No questions in the bank yet. Create one below to begin reusing questions
      across quizzes.
    </div>
    } @else { @for (bq of questionBank; track bq.id || $index; let bi = $index)
    {
    <div
      class="flex items-center justify-between gap-2 p-2 rounded hover:bg-gray-50"
    >
      <div class="flex-1 text-sm text-gray-700 truncate">
        {{ bq.text || "Untitled question" }}
      </div>
      <div class="flex items-center gap-2">
        <button
          (click)="attachQuestion.emit(bi)"
          [disabled]="selectedQuizIndex === null"
          class="text-sm text-purple-600"
        >
          + Attach
        </button>
        <button
          (click)="onEdit(bi)"
          title="Edit question"
          class="text-sm text-blue-600 hover:text-blue-800"
        >
          <i class="fas fa-edit"></i>
        </button>
        <button
          (click)="onDelete(bi)"
          title="Delete question"
          class="text-sm text-red-500 hover:text-red-700"
        >
          <i class="fas fa-trash"></i>
        </button>
      </div>
    </div>
    } }
  </div>

  <div class="mt-3">
    <button
      (click)="createBankQuestion.emit()"
      class="w-full bg-amber-400 text-white px-3 py-2 rounded-lg"
    >
      + Create Bank Question
    </button>
  </div>
</div>
