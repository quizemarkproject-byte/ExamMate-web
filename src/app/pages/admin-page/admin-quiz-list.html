<div>
  <h2 class="text-sm font-medium text-gray-700 mb-3">Quizzes</h2>

  <div class="space-y-3">
    @for (q of quizzes; track q.id; let i = $index) {
    <div class="flex items-center justify-between gap-3 p-2 rounded-lg hover:bg-gray-50">
      <button (click)="selectQuiz.emit(i)" class="text-left flex-1">
        <div class="font-medium text-gray-800">{{ q.name }}</div>
        <div class="text-xs text-gray-400 mt-1">Time: {{ q.timeLimit }} min · Limit: {{ q.questionLimit }}</div>
      </button>
      <button (click)="deleteQuiz.emit(i)" title="Delete quiz" class="text-red-500 hover:text-red-700">
        <i class="fas fa-trash"></i>
      </button>
    </div>
    }
  </div>

  <div class="mt-5 border-t pt-4">
    <h3 class="text-sm font-medium text-gray-700 mb-2">Create New Quiz</h3>
    <div class="mb-2">
      <label for="newQuizName" class="block text-sm font-medium text-gray-700 mb-1">Quiz title</label>
      <input id="newQuizName" [value]="newQuizName" (input)="onNameChange($event.target.value)" placeholder="Quiz title" class="w-full px-3 py-2 border rounded" />
    </div>
    <div class="grid grid-cols-2 gap-2 mb-2">
      <div>
        <label for="newQuizTimeLimit" class="block text-sm font-medium text-gray-700 mb-1">Time limit (min)</label>
        <input id="newQuizTimeLimit" type="number" min="0" [value]="newQuizTimeLimit" (input)="onTimeChange($event.target.value)" placeholder="Time limit (min)" class="w-full px-3 py-2 border rounded" />
      </div>
      <div>
        <label for="newQuizQuestionLimit" class="block text-sm font-medium text-gray-700 mb-1">Question limit</label>
        <input id="newQuizQuestionLimit" type="number" min="0" [value]="newQuizQuestionLimit" (input)="onLimitChange($event.target.value)" placeholder="Question limit" class="w-full px-3 py-2 border rounded" />
      </div>
    </div>

    <div class="mt-2">
      <div class="min-h-[4rem]">
        @if (newQuizErrors && newQuizErrors.length > 0) {
        <div class="text-sm text-red-500">
          @for (err of newQuizErrors; track $index) {<div>{{ err }}</div>}
        </div>
        }
      </div>
      <button (click)="createQuiz.emit()" [disabled]="!isNewQuizValid" class="w-full bg-purple-600 text-white px-3 py-2 rounded-lg disabled:opacity-50">+ Create Quiz</button>
    </div>
  </div>
</div>
